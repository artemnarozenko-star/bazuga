name: 🤖 Приветствие новичков

# Когда запускать
on:
  issues:
    types: [opened]        # Когда создают новый Issue
  pull_request:
    types: [opened]        # Когда создают новый Pull Request

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write        # Разрешаем боту писать в Issues
      pull-requests: write # Разрешаем боту писать в PR
    
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        
        # Сообщение для первого Issue
        issue-message: |
          👋 Привет! Спасибо, что создаёшь первый Issue в проекте **«Автосалон»**!
          
          Мы очень ценим твою помощь! 🙌
          
          ---
          
          ### 📋 Что дальше?
          
          1. Наш менеджер **Артем** проверит твой Issue в ближайшее время
          2. Если нужно уточнить детали — мы напишем в комментариях
          3. Ты можешь отслеживать статус задачи здесь
          
          ### 🚀 Полезные ссылки
          
          - [Документация проекта](https://github.com/artemnarozenko-star/bazuga/wiki)
          - [Как внести вклад](https://github.com/artemnarozenko-star/bazuga/blob/main/CONTRIBUTING.md)
          - [Обсуждения](https://github.com/artemnarozenko-star/bazuga/discussions)
          
          ---
          
          ⭐️ Если тебе нравится проект — поставь звёздочку!
          
          С уважением,
          Команда «Автосалон» 🚗
        
        # Сообщение для первого Pull Request
        pr-message: |
          🚀 Ура! Спасибо за первый Pull Request в проекте **«Автосалон»**!
          
          Ты делаешь проект лучше! 💪
          
          ---
          
          ### 🔍 Что дальше?
          
          1. Наш тимлид **Артем** проведёт код-ревью
          2. Если нужны правки — мы оставим комментарии
          3. После проверки твой код попадёт в основную ветку
          
          ### ✅ Чек-лист перед проверкой
          
          - [ ] Код работает без ошибок
          - [ ] Добавлены тесты (если нужно)
          - [ ] Обновлена документация
          - [ ] Нет конфликтов с основной веткой
          
          ### 📚 Полезные ссылки
          
          - [Правила оформления кода](https://github.com/artemnarozenko-star/bazuga/blob/main/CONTRIBUTING.md)
          - [Документация API](https://github.com/artemnarozenko-star/bazuga/wiki/API)
          - [Наши обсуждения](https://github.com/artemnarozenko-star/bazuga/discussions)
          
          ---
          
          ⭐️ Поставь звёздочку проекту, если он тебе нравится!
          
          Спасибо за вклад! ❤️
          Команда «Автосалон» 🚗
